<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnie's Oven - Order Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <h1>Carnie's Oven</h1>
  </header>

  <main>
    <div id="js-loading-component" class="loading-component">
      <div class="loading-spinner"></div>
      <p class="loading-text">Fetching menu...</p>
    </div>
    <div id="js-success-component" class="success-component" style="display: none;">
      <div class="success-content">
        <div class="success-icon">✓</div>
        <h2>Order is placed.</h2>
        <p>We're going to contact you shortly</p>
      </div>
    </div>
    <form id="orderForm" style="display: none;">
      <div id="js-categories" class="categories-container">
        <!-- Categories will be dynamically added here via JavaScript -->
      </div>

      <div id="js-cart-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h2>My Basket</h2>
            <a href="#" class="modal-close">×</a>
          </div>
          <div id="js-modal-items" class="modal-items">
            <!-- Cart items will be added here -->
          </div>
          <div class="modal-summary">
            <div class="summary-row">
              <span class="summary-label">Total Items:</span>
              <span class="summary-value" id="js-total-items">0</span>
            </div>
            <div class="summary-row total-amount">
              <span class="summary-label">Total Amount:</span>
              <span class="summary-value" id="js-total-amount">P0.00</span>
            </div>
          </div>
          <div class="modal-footer">
            <div class="customer-name-section">
              <label for="js-customer-name">Facebook/Instagram Name</label>
              <input type="text" id="js-customer-name" name="customer_name" class="js-customer-name" placeholder="Enter your Facebook/Instagram name" />
              <p class="helper-text">Enter your exact Facebook/Instagram name — we'll use this to contact you about your order.</p>
            </div>
            <button type="submit" class="place-order-btn" disabled>Place Order</button>
          </div>
        </div>
      </div>
    </form>
  </main>

  <footer class="sticky-footer">
    <a href="#" id="view-cart-btn" class="basket-btn">
      <span class="basket-label">My Basket</span>
      <span class="basket-separator">|</span>
      <span class="basket-items">0 items</span>
      <span class="basket-total">P0.00</span>
    </a>
  </footer>

  <script src="script.js"></script>

  <template id="js-category-template">
    <div class="category-section">
      <h2 class="js-category-name"></h2>
      <div class="product-list js-product-list"></div>
    </div>
  </template>

  <template id="js-product-template">
    <div class="product-item">
      <img class="js-product-image product-image" src="" alt="Product Image" />
      <h3 class="js-product-name"></h3>
      <p class="js-product-description"></p>
      <p class="js-product-price"></p>
      <input type="number" min="0" value="0" class="js-product-quantity" style="display: none;" />
      <div class="quantity-selector">
        <a href="#" class="js-decrement-btn" style="display: none;">−</a>
        <span class="js-quantity-display" style="display: none;"></span>
        <a href="#" class="js-add-to-cart-btn">+</a>
      </div>
      <p class="js-availability-text"></p>
      <p class="js-unavailable-text" style="display: none;"></p>
    </div>
  </template>

  <template id="js-modal-item-template">
    <div class="modal-item">
      <div class="modal-item-name"></div>
      <div class="modal-item-controls">
        <a href="#" class="modal-item-decrement-btn">−</a>
        <span class="modal-item-quantity"></span>
        <a href="#" class="modal-item-increment-btn">+</a>
      </div>
      <div class="modal-item-price"></div>
    </div>
  </template>
</body>
</html>
